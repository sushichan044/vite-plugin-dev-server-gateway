version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 1
    groups:
      major:
        update-types:
          - major
      non-major:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 1
    groups:
      major:
        update-types:
          - major
      non-major:
        update-types:
          - minor
          - patch
